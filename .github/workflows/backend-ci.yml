name: Backend CI

on:
  push:
    branches:
      - main
      - develop

    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

  pull_request:
    branches:
      - main
      - develop

    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

jobs:
  backend-ci:
    name: Backend Quality Checks

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      PYTHON_VERSION: "3.12"

    steps:

      # ----------------------------------------------------------------------
      # Checkout
      # ----------------------------------------------------------------------

      - name: Checkout Repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------------------
      # Python
      # ----------------------------------------------------------------------

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ----------------------------------------------------------------------
      # Cache
      # ----------------------------------------------------------------------

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: >
            ${{ runner.os }}-pip-${{
            hashFiles('backend/requirements.txt')
            }}

          restore-keys: |
            ${{ runner.os }}-pip-

      # ----------------------------------------------------------------------
      # Install Dependencies
      # ----------------------------------------------------------------------

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      # ----------------------------------------------------------------------
      # Ruff
      # ----------------------------------------------------------------------

      - name: Ruff Lint
        run: ruff check . --ignore UP042,UP046

      # ----------------------------------------------------------------------
      # Black
      # ----------------------------------------------------------------------

      - name: Black Format Check
        run: black --check .

      # ----------------------------------------------------------------------
      # MyPy
      # ----------------------------------------------------------------------

      - name: MyPy
        run: mypy .

      # ----------------------------------------------------------------------
      # Pytest
      # ----------------------------------------------------------------------

      - name: Run Tests
        run: pytest

      # ----------------------------------------------------------------------
      # Docker Build
      # ----------------------------------------------------------------------

      - name: Build Docker Image
        working-directory: .
        run: |
          docker build \
            -t industrial-knowledge-backend:latest \
            ./backend